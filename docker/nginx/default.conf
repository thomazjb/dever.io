# =============================================
# Configuração Nginx para Yii2
# Pretty URLs habilitadas, proxy para PHP-FPM
# =============================================

server {
    listen 80;
    server_name localhost;
    root /var/www/html/web;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Pretty URLs - redireciona tudo para index.php
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Processamento PHP via FastCGI
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Bloquear acesso a arquivos ocultos
    location ~ /\.(ht|git|svn) {
        deny all;
    }

    # Cache para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Logs
    access_log /var/log/nginx/dever-access.log;
    error_log /var/log/nginx/dever-error.log;
}
