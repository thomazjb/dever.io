version: '3.8'

services:
  # ===========================================
  # Servidor PHP-FPM 8.3 para aplicação Yii2
  # ===========================================
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: dever-php
    volumes:
      - ./src:/var/www/html
      - ./phpunit.xml:/var/www/html/phpunit.xml
      - ./tests:/var/www/html/tests
    environment:
      DB_HOST: mysql
      DB_NAME: dever_db
      DB_USER: dever_user
      DB_PASSWORD: dever_secret
      MINIO_ENDPOINT: http://minio:9000
      MINIO_KEY: minio_access_key
      MINIO_SECRET: minio_secret_key
      MINIO_BUCKET: dever-uploads
      MINIO_REGION: us-east-1
      MINIO_USE_PATH_STYLE: 'true'
      MINIO_PUBLIC_ENDPOINT: http://localhost:9000
    networks:
      - dever-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Servidor Web Nginx
  # ===========================================
  nginx:
    image: nginx:1.25-alpine
    container_name: dever-nginx
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - dever-net
    depends_on:
      - php
    restart: unless-stopped

  # ===========================================
  # Banco de Dados MySQL 8.0
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: dever-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_secret
      MYSQL_DATABASE: dever_db
      MYSQL_USER: dever_user
      MYSQL_PASSWORD: dever_secret
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dever-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ===========================================
  # MinIO - Object Storage (S3 compatible)
  # ===========================================
  minio:
    image: minio/minio:latest
    container_name: dever-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio_access_key
      MINIO_ROOT_PASSWORD: minio_secret_key
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - dever-net
    restart: unless-stopped

  # ===========================================
  # MinIO Client - Cria bucket automaticamente
  # ===========================================
  minio-init:
    image: minio/mc:latest
    container_name: dever-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set dever http://minio:9000 minio_access_key minio_secret_key;
        mc mb dever/dever-uploads --ignore-existing;
        mc anonymous set download dever/dever-uploads;
        echo 'Bucket dever-uploads criado com sucesso!';
      "
    networks:
      - dever-net

networks:
  dever-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local
  minio-data:
    driver: local
